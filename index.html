<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Department Dashboard</title>
    <!-- Tailwind CSS for rapid layout and styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for large screen display */
        body {
            overflow: hidden;
            background-color: #0f172a; /* Tailwind slate-900 */
        }
        /* Add subtle glow to data values for tech feel */
        .data-value {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body class="text-slate-200 h-screen w-screen flex flex-col font-sans">

    <!-- Main Content Area (Centered data with hospital name below) -->
    <main class="flex-1 flex flex-col items-center justify-center p-10 space-y-12">
        
        <!-- Core Data Cards (3 columns) - Moved to top -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-7xl mx-auto">
            
            <!-- Patient Count -->
            <div class="bg-slate-800/80 rounded-2xl p-8 border border-slate-700 shadow-2xl flex flex-col items-center justify-center transform transition duration-500 hover:scale-105">
                <h3 class="text-2xl text-slate-400 font-medium mb-4 uppercase tracking-widest text-center w-full">Patient Count</h3>
                <div id="val-patient-count" class="data-value text-8xl md:text-9xl font-black text-sky-400">--</div>
            </div>

            <!-- Est. Length of Stay -->
            <div class="bg-slate-800/80 rounded-2xl p-8 border border-slate-700 shadow-2xl flex flex-col items-center justify-center transform transition duration-500 hover:scale-105">
                <h3 class="text-2xl text-slate-400 font-medium mb-4 uppercase tracking-widest text-center w-full">Est. Length of Stay</h3>
                <div id="val-length-stay" class="data-value text-7xl md:text-8xl font-black text-amber-400 text-center">--</div>
            </div>

            <!-- Hours of Operation -->
            <div class="bg-slate-800/80 rounded-2xl p-8 border border-slate-700 shadow-2xl flex flex-col items-center justify-center transform transition duration-500 hover:scale-105">
                <h3 class="text-2xl text-slate-400 font-medium mb-4 uppercase tracking-widest text-center w-full">Hours of Operation</h3>
                <div id="val-hours" class="data-value text-5xl md:text-6xl font-bold text-emerald-400 text-center leading-snug">--</div>
            </div>

        </div>

        <!-- Hospital Name Display (Moved to bottom, smaller font) -->
        <h2 id="display-hospital-name" class="text-4xl md:text-5xl font-bold text-slate-300 tracking-wide text-center drop-shadow-md mt-4">
            ---
        </h2>

    </main>

    <!-- Bottom Control and Status Bar -->
    <footer class="w-full p-6 px-10 flex justify-between items-end bg-slate-900/80 border-t border-slate-800">
        <!-- Bottom Left: Hospital Selector -->
        <div class="flex items-center space-x-4">
            <label for="hospital-select" class="text-lg text-slate-400 font-medium whitespace-nowrap tracking-wide">Switch Location:</label>
            <div class="relative w-72">
                <select id="hospital-select" class="block w-full appearance-none bg-slate-800 border border-slate-600 text-slate-400 py-3 px-5 pr-8 rounded-lg shadow leading-tight focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 text-lg cursor-pointer transition-colors">
                    <option value="">Loading...</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </div>

        <!-- Bottom Right: Status Info -->
        <div class="flex flex-col items-end space-y-2">
            <div id="status-indicator" class="flex items-center space-x-2 text-sm">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-emerald-400 font-medium tracking-wide">Live Sync Active</span>
            </div>
            <div id="update-time" class="text-sm text-slate-400 font-mono">Last Updated: --:--</div>
        </div>
    </footer>

    <!-- Error Toast (Top centered) -->
    <div id="error-toast" class="fixed top-10 left-1/2 transform -translate-x-1/2 bg-red-900 text-red-100 px-6 py-4 rounded-lg shadow-2xl hidden items-center space-x-3 transition-opacity duration-300 z-50">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="error-message">Data fetch failed. Please check network.</span>
    </div>

    <script>
        // === Configuration ===
        const API_URL = 'https://services7.arcgis.com/BuriUAtfp8cZMlDt/arcgis/rest/services/dev_waittimes_exb_hfl_c2a90_3b176_ae70f/FeatureServer/0/query?where=1%3D1&outFields=hospital_name,ED_Volume,ed_wait_range,opening_hours&f=pjson';
        const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes

        // === State Management ===
        let hospitalDataMap = new Map(); // Store data with hospital_name as Key
        let currentSelectedHospital = null;

        // === DOM Element References ===
        const selectEl = document.getElementById('hospital-select');
        const nameEl = document.getElementById('display-hospital-name');
        const countEl = document.getElementById('val-patient-count');
        const stayEl = document.getElementById('val-length-stay');
        const hoursEl = document.getElementById('val-hours');
        const updateTimeEl = document.getElementById('update-time');
        const errorToast = document.getElementById('error-toast');
        const errorMessage = document.getElementById('error-message');

        // === Core Functions ===

        // 1. Fetch and process data
        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const json = await response.json();
                
                // Check for specific ArcGIS API errors
                if (json.error) throw new Error(json.error.message || 'ArcGIS API Error');
                if (!json.features) throw new Error('Invalid data format: missing features');

                // Parse data and store in Map
                hospitalDataMap.clear();
                json.features.forEach(feature => {
                    const attrs = feature.attributes;
                    if (attrs.hospital_name) {
                        hospitalDataMap.set(attrs.hospital_name, {
                            patientCount: attrs.ED_Volume !== null ? attrs.ED_Volume : 'N/A',
                            lengthOfStay: attrs.ed_wait_range || 'N/A',
                            hours: attrs.opening_hours || 'N/A'
                        });
                    }
                });

                const now = new Date();
                const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
                updateTimeEl.textContent = `Last Updated: ${timeString}`;
                hideError();

                // Initialize dropdown on first load
                if (selectEl.options.length <= 1) {
                    initDropdown();
                }

                // Refresh UI (keep currently selected hospital)
                if (!currentSelectedHospital && hospitalDataMap.size > 0) {
                    const targetHospital = "Saint John Regional Hospital";
                    if (hospitalDataMap.has(targetHospital)) {
                        currentSelectedHospital = targetHospital;
                    } else {
                        // Fallback to the first one if target is not found
                        currentSelectedHospital = Array.from(hospitalDataMap.keys())[0];
                    }
                    selectEl.value = currentSelectedHospital;
                }
                
                renderUI();

            } catch (error) {
                console.error('Data fetch failed:', error);
                showError(`Sync Error: ${error.message} (Showing cached data)`);
            }
        }

        // 2. Initialize Dropdown Menu
        function initDropdown() {
            selectEl.innerHTML = ''; // Clear existing
            const sortedNames = Array.from(hospitalDataMap.keys()).sort();
            
            sortedNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                selectEl.appendChild(option);
            });
        }

        // 3. Render UI Data
        function renderUI() {
            if (!currentSelectedHospital || !hospitalDataMap.has(currentSelectedHospital)) return;

            const data = hospitalDataMap.get(currentSelectedHospital);
            
            // Update DOM
            nameEl.textContent = currentSelectedHospital;
            countEl.textContent = data.patientCount;
            stayEl.textContent = data.lengthOfStay;
            hoursEl.textContent = data.hours;
            
            // Defensive UI: dynamically adjust font sizes for long strings
            // Using full className assignments to match the new default larger sizes
            if (data.lengthOfStay.length > 15) {
                stayEl.className = "data-value text-5xl md:text-6xl font-black text-amber-400 text-center";
            } else {
                stayEl.className = "data-value text-7xl md:text-8xl font-black text-amber-400 text-center";
            }
            
            if (data.hours.length > 20) {
                hoursEl.className = "data-value text-3xl md:text-4xl font-bold text-emerald-400 text-center leading-snug";
            } else {
                hoursEl.className = "data-value text-5xl md:text-6xl font-bold text-emerald-400 text-center leading-snug";
            }
        }

        // === Event Listeners ===

        // Listen for dropdown changes
        selectEl.addEventListener('change', (e) => {
            currentSelectedHospital = e.target.value;
            renderUI();
        });

        // Error toast controls
        function showError(msg) {
            errorMessage.textContent = msg;
            errorToast.classList.remove('hidden');
            errorToast.classList.add('flex');
            setTimeout(hideError, 8000); // Auto-hide after 8 seconds
        }
        function hideError() {
            errorToast.classList.add('hidden');
            errorToast.classList.remove('flex');
        }

        // === Application Startup ===
        
        // 1. Initial data fetch
        fetchData();
        
        // 2. Set interval (execute every 5 minutes)
        setInterval(fetchData, REFRESH_INTERVAL);

    </script>
</body>
</html>
